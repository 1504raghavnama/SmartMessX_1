version: "3.8"

services:
  smartmessx-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartmessx-app
    ports:
      - "8081:8081"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
